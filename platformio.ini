[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
lib_deps = 
	knolleary/PubSubClient@^2.8.0
	marcoschwartz/LiquidCrystal_I2C@^1.1.4
	madhephaestus/ESP32Servo@^3.1.3
	bogde/HX711@^0.7.5
	ericksimoes/Ultrasonic@^3.0.0
	bblanchon/ArduinoJson@^7.4.3
